name: release

# Native builds are required because gpui uses each operating system's GPU
# backend. Main and pull-request builds verify packaging; v* tags also publish
# the generated installers as a GitHub Release.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build:
    name: Build & package (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            formats: deb,appimage
            artifact_name: markion-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            formats: app,dmg
            artifact_name: markion-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            formats: nsis
            artifact_name: markion-windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (${{ matrix.target }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry + git + target
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            pkg-config \
            libglib2.0-dev \
            libssl-dev \
            libfontconfig1-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libvulkan-dev \
            libasound2-dev

      # Each runner is native for its matrix target, and packager expects the
      # executable in target/release rather than target/<triple>/release.
      - name: Build release binary
        run: cargo build --release

      # Source installation matches the proven Medor workflow and avoids
      # cargo-packager config auto-detection issues seen with prebuilt binaries.
      - name: Install cargo-packager
        run: cargo install cargo-packager --locked --force

      - name: Package (${{ matrix.formats }})
        run: cargo packager --release --config packager.toml --formats ${{ matrix.formats }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts to publish
        run: ls -laR dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
